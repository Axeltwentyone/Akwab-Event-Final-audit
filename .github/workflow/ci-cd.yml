name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # 1. Tests backend Laravel (tourne sur push ET pull_request)
  # ──────────────────────────────────────────────
  backend-tests:
    name: Backend tests (Laravel)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: Akwab-Api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql, bcmath, opcache
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Configure DB for tests
        run: |
          php -r "
          \$env = file_get_contents('.env');
          \$env = preg_replace('/DB_CONNECTION=.*/', 'DB_CONNECTION=mysql', \$env);
          \$env = preg_replace('/DB_HOST=.*/', 'DB_HOST=127.0.0.1', \$env);
          \$env = preg_replace('/DB_PORT=.*/', 'DB_PORT=3306', \$env);
          \$env = preg_replace('/DB_DATABASE=.*/', 'DB_DATABASE=testing', \$env);
          \$env = preg_replace('/DB_USERNAME=.*/', 'DB_USERNAME=root', \$env);
          \$env = preg_replace('/DB_PASSWORD=.*/', 'DB_PASSWORD=root', \$env);
          file_put_contents('.env', \$env);
          "

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  # ──────────────────────────────────────────────
  # 2. Build check frontend (tourne sur push ET pull_request)
  # ──────────────────────────────────────────────
  frontend-build:
    name: Frontend build check (React/Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Akwab-Front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Akwab-Front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PLACEHOLDER_FOR_CI_BUILD_ONLY }}

  # ──────────────────────────────────────────────
  # 3. Déploiement Railway (uniquement après succès des tests,
  #    et uniquement sur push vers main — jamais sur une simple PR)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend service
        working-directory: Akwab-Api
        run: railway up --service back --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend service
        working-directory: Akwab-Front
        run: railway up --service front --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
